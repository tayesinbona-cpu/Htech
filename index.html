<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hi Tech Academy | Ethiopia's Future</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Supabase JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            --font-sans: "Inter", ui-sans-serif, system-ui, sans-serif;
            --glass-bg: rgba(15, 23, 42, 0.6);
            --glass-border: rgba(255, 255, 255, 0.125);
            --neon-indigo: #6366f1;
        }

        body {
            background: #0f172a;
            color: #f8fafc;
            overflow-x: hidden;
            font-family: var(--font-sans);
            margin: 0;
            min-h-screen;
        }

        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }

        .mesh-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%),
                radial-gradient(at 80% 80%, hsla(280,50%,20%,1) 0, transparent 50%);
            animation: mesh-move 20s ease infinite alternate;
        }

        @keyframes mesh-move {
            0% { transform: scale(1); }
            100% { transform: scale(1.2); }
        }

        .periodic-container {
            perspective: 1000px;
        }

        .element-card {
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
            cursor: pointer;
            position: relative;
        }

        .element-card:hover {
            transform: translateZ(50px) rotateY(10deg);
        }

        .view-transition {
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .hidden-view {
            display: none;
            opacity: 0;
            transform: translateY(10px);
        }

        .active-view {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0f172a;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--glass-border);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--neon-indigo);
        }

        .line-clamp-3 {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <div class="mesh-gradient"></div>

    <!-- Navigation -->
    <nav class="fixed top-0 w-full z-50 px-6 py-4">
        <div class="max-w-7xl mx-auto glass px-6 py-3 flex justify-between items-center rounded-2xl">
            <div class="flex items-center gap-2 cursor-pointer" onclick="navigateTo('home')">
                <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center shadow-[0_0_15px_rgba(79,70,229,0.5)]">
                    <i data-lucide="zap" class="w-5 h-5 text-white"></i>
                </div>
                <span class="text-xl font-bold tracking-tighter">
                    HI TECH <span class="text-indigo-400">ACADEMY</span>
                </span>
            </div>
            
            <div class="hidden lg:flex items-center gap-8 text-sm font-medium text-gray-400">
                <button onclick="navigateTo('home')" class="hover:text-white transition">Home</button>
                <button onclick="scrollToSection('about')" class="hover:text-white transition">About Harar</button>
                <button onclick="scrollToSection('science')" class="hover:text-white transition">Science Lab</button>
            </div>

            <div id="auth-nav" class="flex gap-4">
                <!-- Dynamic Auth Content -->
            </div>
        </div>
    </nav>

    <main id="main-content" class="pt-32 pb-20 px-6 max-w-7xl mx-auto">
        <!-- Views will be rendered here -->
    </main>

    <script>
        // Supabase Configuration
        const SUPABASE_URL = "https://soyakvlfqrhjnecyscxy.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_1GSfqmi0JtuEtdZ7u75c1w_OmYDrdsO";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // App State
        let state = {
            view: 'home',
            user: null,
            profile: null,
            posts: [],
            loading: true
        };

        // Initialize App
        async function init() {
            try {
                const { data: { session }, error: sessionError } = await supabaseClient.auth.getSession();
                if (sessionError) throw sessionError;
                
                state.user = session?.user ?? null;
                
                if (state.user) {
                    await fetchProfile(state.user.id);
                    await fetchPosts();
                }
                
                state.loading = false;
                render();

                // Listen for auth changes
                supabaseClient.auth.onAuthStateChange(async (event, session) => {
                    state.user = session?.user ?? null;
                    if (state.user) {
                        await fetchProfile(state.user.id);
                        await fetchPosts();
                    } else {
                        state.profile = null;
                        state.posts = [];
                        state.view = 'home';
                    }
                    render();
                });
            } catch (err) {
                console.error("Initialization error:", err);
                state.loading = false;
                render();
            }
        }

        async function fetchProfile(userId) {
            try {
                const { data, error } = await supabaseClient.from('users').select('*').eq('id', userId).single();
                
                if (data) {
                    state.profile = data;
                    if (state.view === 'login' || state.view === 'signup') {
                        state.view = data.role;
                    }
                } else {
                    // Create profile if it doesn't exist
                    const { data: newProfile, error: insertError } = await supabaseClient.from('users').insert([{ 
                        id: userId, 
                        email: state.user.email, 
                        role: 'student' 
                    }]).select().single();
                    
                    if (insertError) throw insertError;
                    state.profile = newProfile;
                    state.view = 'student';
                }
            } catch (err) {
                console.error("Profile fetch error:", err);
            }
        }

        async function fetchPosts() {
            try {
                let query = supabaseClient.from('posts').select('*').order('created_at', { ascending: false });
                
                if (state.profile?.role === 'student') {
                    query = query.or('audience.eq.student,audience.eq.all');
                } else if (state.profile?.role === 'teacher') {
                    query = query.or('audience.eq.teacher,audience.eq.all');
                }
                
                const { data, error } = await query;
                if (error) throw error;
                state.posts = data || [];
                if (state.view === 'admin' || state.view === 'teacher' || state.view === 'student') {
                    renderDashboard();
                }
            } catch (err) {
                console.error("Posts fetch error:", err);
            }
        }

        // Navigation
        function navigateTo(view) {
            state.view = view;
            render();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function scrollToSection(id) {
            if (state.view !== 'home') {
                navigateTo('home');
                setTimeout(() => {
                    document.getElementById(id)?.scrollIntoView({ behavior: 'smooth' });
                }, 100);
            } else {
                document.getElementById(id)?.scrollIntoView({ behavior: 'smooth' });
            }
        }

        async function handleLogout() {
            await supabaseClient.auth.signOut();
            window.location.reload();
        }

        // Rendering Logic
        function render() {
            renderAuthNav();
            const main = document.getElementById('main-content');
            
            if (state.loading) {
                main.innerHTML = `<div class="fixed inset-0 bg-slate-950 flex items-center justify-center"><div class="w-16 h-16 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin"></div></div>`;
                return;
            }

            switch (state.view) {
                case 'home':
                    renderHome();
                    break;
                case 'login':
                    renderAuth('login');
                    break;
                case 'signup':
                    renderAuth('signup');
                    break;
                case 'admin':
                case 'teacher':
                case 'student':
                    renderDashboard();
                    break;
            }
            
            lucide.createIcons();
        }

        function renderAuthNav() {
            const nav = document.getElementById('auth-nav');
            if (state.user) {
                nav.innerHTML = `
                    <div class="flex items-center gap-4">
                        <div class="hidden md:block text-right">
                            <p class="text-sm font-bold">${state.profile?.role?.toUpperCase() || 'USER'}</p>
                            <p class="text-[10px] text-gray-500">${state.user.email}</p>
                        </div>
                        <button onclick="handleLogout()" class="w-10 h-10 glass rounded-full flex items-center justify-center text-red-400 hover:bg-red-400/10 transition">
                            <i data-lucide="log-out" class="w-5 h-5"></i>
                        </button>
                    </div>
                `;
            } else {
                nav.innerHTML = `
                    <button onclick="navigateTo('login')" class="px-5 py-2 glass hover:bg-white/10 transition text-sm font-medium rounded-xl">Login</button>
                    <button onclick="navigateTo('signup')" class="px-5 py-2 bg-indigo-600 hover:bg-indigo-700 transition rounded-xl text-sm font-bold shadow-lg shadow-indigo-500/20">Get Started</button>
                `;
            }
            lucide.createIcons();
        }

        function renderHome() {
            const main = document.getElementById('main-content');
            main.innerHTML = `
                <div class="space-y-32">
                    <!-- Hero Section -->
                    <section class="flex flex-col items-center text-center space-y-12 pt-20">
                        <div class="space-y-8 max-w-4xl mx-auto">
                            <div class="inline-flex items-center gap-2 px-4 py-2 glass rounded-full text-indigo-400 text-sm font-bold border border-indigo-500/20 shadow-[0_0_20px_rgba(79,70,229,0.15)] mx-auto">
                                <i data-lucide="zap" class="w-4 h-4 fill-current"></i>
                                <span>EMPOWERING ETHIOPIA'S FUTURE</span>
                            </div>
                            <h1 class="text-7xl md:text-8xl font-black tracking-tighter leading-[0.9] text-white">
                                THE NEXT GEN <br />
                                <span class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 via-purple-400 to-cyan-400">TECH LEADERS</span>
                            </h1>
                            <p class="text-xl text-gray-400 leading-relaxed max-w-2xl mx-auto">
                                Located in the historic city of Harar, Hi Tech Academy combines the rich cultural background of Ethiopia with cutting-edge STEM education. Our students are trained in AI, Robotics, and Software Engineering from day one.
                            </p>
                            <div class="grid grid-cols-2 gap-4 max-w-lg mx-auto">
                                <div class="glass p-4 rounded-2xl border border-white/5 hover:border-indigo-500/30 transition-colors group">
                                    <i data-lucide="graduation-cap" class="w-8 h-8 text-yellow-500 mb-2 mx-auto"></i>
                                    <h4 class="font-bold">Top Results</h4>
                                    <p class="text-xs text-gray-500">Leading national exam scores in Harari Region.</p>
                                </div>
                                <div class="glass p-4 rounded-2xl border border-white/5 hover:border-green-500/30 transition-colors group">
                                    <i data-lucide="cpu" class="w-8 h-8 text-green-500 mb-2 mx-auto"></i>
                                    <h4 class="font-bold">Tech First</h4>
                                    <p class="text-xs text-gray-500">1:1 Student to Laptop ratio in all classes.</p>
                                </div>
                            </div>
                            <div class="flex flex-wrap justify-center gap-4">
                                <button onclick="navigateTo('signup')" class="px-10 py-5 bg-indigo-600 hover:bg-indigo-700 transition rounded-2xl text-lg font-black shadow-[0_0_30px_rgba(79,70,229,0.4)] transform hover:scale-105 active:scale-95">
                                    JOIN THE ACADEMY
                                </button>
                                <button onclick="scrollToSection('about')" class="px-10 py-5 glass hover:bg-white/10 transition rounded-2xl text-lg font-bold border border-white/10">
                                    EXPLORE CAMPUS
                                </button>
                            </div>
                        </div>
                    </section>

                    <!-- Vision & Mission -->
                    <section class="grid md:grid-cols-2 gap-8">
                        <div class="glass p-8 rounded-3xl border border-white/10 relative overflow-hidden group">
                            <div class="w-12 h-12 bg-indigo-600/20 rounded-xl flex items-center justify-center mb-6">
                                <i data-lucide="globe" class="w-6 h-6 text-indigo-400"></i>
                            </div>
                            <h3 class="text-3xl font-bold mb-4 tracking-tight">Our Vision</h3>
                            <p class="text-gray-400 text-lg leading-relaxed">To empower Ethiopian youth with world-class technical education, fostering innovation that resonates globally while staying rooted in our rich cultural heritage.</p>
                        </div>
                        <div class="glass p-8 rounded-3xl border border-white/10 relative overflow-hidden group">
                            <div class="w-12 h-12 bg-purple-600/20 rounded-xl flex items-center justify-center mb-6">
                                <i data-lucide="graduation-cap" class="w-6 h-6 text-purple-400"></i>
                            </div>
                            <h3 class="text-3xl font-bold mb-4 tracking-tight">Our Mission</h3>
                            <p class="text-gray-400 text-lg leading-relaxed">Our mission is to provide a rigorous, tech-focused curriculum that prepares students for the challenges of the digital age, creating the next generation of leaders.</p>
                        </div>
                    </section>

                    <!-- Science Lab -->
                    <section id="science" class="space-y-12 py-10">
                        <div class="text-center space-y-4">
                            <div class="w-16 h-16 bg-indigo-600/20 rounded-2xl flex items-center justify-center mx-auto mb-6 border border-indigo-500/20">
                                <i data-lucide="beaker" class="w-8 h-8 text-indigo-400"></i>
                            </div>
                            <h2 class="text-6xl font-black tracking-tighter">VIRTUAL <span class="text-indigo-400">SCIENCE LAB</span></h2>
                            <p class="text-gray-400 max-w-2xl mx-auto text-lg">Interactive 3D periodic table and chemical simulations for our advanced chemistry students.</p>
                        </div>
                        <div class="glass p-8 rounded-[3rem] border border-white/5 shadow-inner">
                            <div id="periodic-table" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4 periodic-container">
                                <!-- Elements will be rendered here -->
                            </div>
                        </div>
                    </section>

                    <!-- Harar Map -->
                    <section id="about" class="glass rounded-[40px] p-8 md:p-16 border border-white/10 relative overflow-hidden group">
                        <div class="grid lg:grid-cols-2 gap-16 items-center">
                            <div class="space-y-8">
                                <div class="inline-flex items-center gap-2 text-indigo-400 font-bold tracking-[0.2em] text-xs uppercase">
                                    <i data-lucide="map-pin" class="w-5 h-5"></i> HARAR, ETHIOPIA
                                </div>
                                <h2 class="text-6xl font-black leading-[0.9] tracking-tighter">THE WALLED CITY'S <br /> <span class="text-indigo-400">TECH HUB</span></h2>
                                <p class="text-gray-400 text-xl leading-relaxed">
                                    Hi Tech Academy is situated just outside the historic Jugol Walls of Harar.
                                </p>
                                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                    <div class="flex items-center gap-3 text-gray-300 glass px-4 py-3 rounded-xl border border-white/5">
                                        <div class="w-2 h-2 bg-indigo-500 rounded-full"></div>
                                        <span class="text-sm font-medium">Computer Labs</span>
                                    </div>
                                    <div class="flex items-center gap-3 text-gray-300 glass px-4 py-3 rounded-xl border border-white/5">
                                        <div class="w-2 h-2 bg-indigo-500 rounded-full"></div>
                                        <span class="text-sm font-medium">Fiber Connectivity</span>
                                    </div>
                                </div>
                            </div>
                            <div class="h-[500px] rounded-[2.5rem] overflow-hidden glass border border-white/10 shadow-2xl relative">
                                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d15754.74312484435!2d42.1158141!3d9.3126343!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x16310196720d2077%3A0x633513369680326b!2sHarar!5e0!3m2!1sen!2set!4v1711880000000!5m2!1sen!2set" width="100%" height="100%" style="border: 0; filter: invert(90%) hue-rotate(180deg) brightness(0.8) contrast(1.2);" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
                            </div>
                        </div>
                    </section>
                </div>
            `;
            renderPeriodicTable();
            lucide.createIcons();
        }

        function renderPeriodicTable() {
            const elements = [
                { symbol: 'H', name: 'Hydrogen', mass: '1.008', color: 'bg-blue-500/20' },
                { symbol: 'He', name: 'Helium', mass: '4.002', color: 'bg-purple-500/20' },
                { symbol: 'Li', name: 'Lithium', mass: '6.941', color: 'bg-red-500/20' },
                { symbol: 'Be', name: 'Beryllium', mass: '9.012', color: 'bg-orange-500/20' },
                { symbol: 'B', name: 'Boron', mass: '10.81', color: 'bg-green-500/20' },
                { symbol: 'C', name: 'Carbon', mass: '12.01', color: 'bg-indigo-500/20' },
                { symbol: 'N', name: 'Nitrogen', mass: '14.007', color: 'bg-emerald-500/20' },
                { symbol: 'O', name: 'Oxygen', mass: '15.999', color: 'bg-cyan-500/20' },
                { symbol: 'F', name: 'Fluorine', mass: '18.998', color: 'bg-sky-500/20' },
                { symbol: 'Ne', name: 'Neon', mass: '20.180', color: 'bg-indigo-500/20' },
                { symbol: 'Na', name: 'Sodium', mass: '22.990', color: 'bg-red-600/20' },
                { symbol: 'Mg', name: 'Magnesium', mass: '24.305', color: 'bg-orange-600/20' },
            ];

            const container = document.getElementById('periodic-table');
            container.innerHTML = elements.map((el, i) => `
                <div class="glass p-6 rounded-xl border border-white/10 element-card h-40 flex flex-col items-center justify-center relative overflow-hidden group">
                    <div class="absolute inset-0 ${el.color} opacity-20 group-hover:opacity-40 transition-opacity"></div>
                    <span class="text-xs text-gray-500 absolute top-2 left-2 font-mono">${i + 1}</span>
                    <span class="text-4xl font-black text-white mb-1">${el.symbol}</span>
                    <span class="text-[10px] uppercase tracking-widest text-gray-400">${el.name}</span>
                    <span class="text-[8px] text-gray-600 mt-2">${el.mass}</span>
                </div>
            `).join('');
        }

        function renderAuth(mode) {
            const main = document.getElementById('main-content');
            main.innerHTML = `
                <div class="max-w-md mx-auto">
                    <div class="glass p-10 rounded-3xl border border-white/10">
                        <h2 class="text-3xl font-bold mb-8 text-center">${mode === 'login' ? 'Welcome Back' : 'Join Academy'}</h2>
                        <form id="auth-form" class="space-y-6">
                            ${mode === 'signup' ? `
                                <div>
                                    <label class="block text-xs font-bold uppercase tracking-widest text-gray-500 mb-2">Full Name</label>
                                    <input type="text" id="auth-name" required class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 outline-none focus:border-indigo-500 transition text-white" />
                                </div>
                            ` : ''}
                            <div>
                                <label class="block text-xs font-bold uppercase tracking-widest text-gray-500 mb-2">Email Address</label>
                                <input type="email" id="auth-email" required class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 outline-none focus:border-indigo-500 transition text-white" />
                            </div>
                            <div>
                                <label class="block text-xs font-bold uppercase tracking-widest text-gray-500 mb-2">Password</label>
                                <input type="password" id="auth-password" required class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 outline-none focus:border-indigo-500 transition text-white" />
                            </div>
                            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 py-4 rounded-xl font-bold shadow-xl shadow-indigo-500/20 transition transform active:scale-95 uppercase tracking-widest text-white">
                                ${mode === 'login' ? 'Sign In' : 'Create Account'}
                            </button>
                        </form>
                        <p class="text-center mt-8 text-sm text-gray-400">
                            ${mode === 'login' ? "New here? " : "Already have an account? "}
                            <button onclick="navigateTo('${mode === 'login' ? 'signup' : 'login'}')" class="text-indigo-400 font-bold hover:underline">
                                ${mode === 'login' ? 'Create an account' : 'Sign in'}
                            </button>
                        </p>
                    </div>
                </div>
            `;

            document.getElementById('auth-form').onsubmit = async (e) => {
                e.preventDefault();
                const email = document.getElementById('auth-email').value;
                const password = document.getElementById('auth-password').value;
                
                if (mode === 'signup') {
                    const name = document.getElementById('auth-name').value;
                    const { data, error } = await supabaseClient.auth.signUp({ email, password });
                    if (error) alert(error.message);
                    else if (data.user) {
                        await supabaseClient.from('users').insert([{ id: data.user.id, email, full_name: name, role: 'student' }]);
                        alert("Signup successful! Please login.");
                        navigateTo('login');
                    }
                } else {
                    const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
                    if (error) alert(error.message);
                }
            };
        }

        async function renderDashboard() {
            const main = document.getElementById('main-content');
            main.innerHTML = `
                <div class="space-y-12">
                    <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                        <div>
                            <h2 class="text-4xl font-black mb-2 text-white">Welcome, ${state.profile?.full_name || state.user?.email?.split('@')[0] || 'User'}</h2>
                            <p class="text-gray-400">Role: <span class="text-indigo-400 font-bold uppercase">${state.profile?.role || 'Student'}</span></p>
                        </div>
                        <button onclick="fetchPosts()" class="px-4 py-2 glass rounded-xl text-xs font-bold hover:bg-white/10 transition flex items-center gap-2">
                            <i data-lucide="refresh-cw" class="w-4 h-4"></i> REFRESH CONTENT
                        </button>
                    </header>

                    ${(state.profile?.role === 'admin' || state.profile?.role === 'teacher') ? `
                        <div class="glass p-8 rounded-3xl border border-white/10">
                            <h3 class="text-xl font-bold mb-6 flex items-center gap-2"><i data-lucide="upload" class="w-5 h-5"></i> Publish New Content</h3>
                            <form id="upload-form" class="grid md:grid-cols-2 gap-6">
                                <div class="space-y-4">
                                    <input type="text" id="post-title" placeholder="Content Title" required class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 outline-none focus:border-indigo-500 transition text-white" />
                                    <textarea id="post-desc" placeholder="Description" rows="3" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 outline-none focus:border-indigo-500 transition text-white"></textarea>
                                </div>
                                <div class="space-y-4">
                                    <select id="post-audience" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 outline-none focus:border-indigo-500 transition text-white">
                                        <option value="all" class="bg-slate-900">Public (All)</option>
                                        <option value="student" class="bg-slate-900">Students Only</option>
                                        <option value="teacher" class="bg-slate-900">Teachers Only</option>
                                    </select>
                                    <input type="file" id="post-file" required class="w-full text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-bold file:bg-indigo-600 file:text-white hover:file:bg-indigo-700" />
                                    <button type="submit" id="upload-btn" class="w-full bg-indigo-600 py-3 rounded-xl font-bold shadow-lg shadow-indigo-500/20 transition text-white">
                                        PUBLISH CONTENT
                                    </button>
                                </div>
                            </form>
                        </div>
                    ` : ''}

                    <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8">
                        ${state.posts.length > 0 ? state.posts.map((post, i) => `
                            <div class="glass p-6 rounded-3xl border border-white/10 flex flex-col h-full group">
                                <div class="relative overflow-hidden rounded-lg mb-4 aspect-video">
                                    ${post.type === 'image' ? `<img src="${post.file_url}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110" />` : ''}
                                    ${post.type === 'video' ? `<video src="${post.file_url}" class="w-full h-full bg-black" controls></video>` : ''}
                                    ${post.type === 'pdf' ? `<div class="w-full h-full bg-indigo-900/20 flex items-center justify-center"><i data-lucide="file-text" class="w-12 h-12 text-indigo-400"></i></div>` : ''}
                                    <div class="absolute top-2 right-2 px-2 py-1 glass text-[10px] uppercase font-bold tracking-wider rounded-md">${post.audience}</div>
                                </div>
                                <h3 class="text-xl font-bold mb-2 text-indigo-300">${post.title}</h3>
                                <p class="text-sm text-gray-400 mb-4 flex-grow line-clamp-3">${post.description || ''}</p>
                                <div class="flex justify-between items-center mt-auto pt-4 border-t border-white/10">
                                    <span class="text-[10px] text-gray-500">${new Date(post.created_at).toLocaleDateString()}</span>
                                    <div class="flex gap-2">
                                        <a href="${post.file_url}" target="_blank" class="p-2 glass hover:bg-white/10 rounded-lg transition"><i data-lucide="external-link" class="w-4 h-4"></i></a>
                                        ${state.profile?.role === 'admin' ? `<button onclick="deletePost('${post.id}')" class="p-2 glass hover:bg-red-400/20 text-red-400 rounded-lg transition"><i data-lucide="trash-2" class="w-4 h-4"></i></button>` : ''}
                                    </div>
                                </div>
                            </div>
                        `).join('') : `
                            <div class="col-span-full py-20 text-center space-y-4">
                                <div class="w-20 h-20 bg-white/5 rounded-full flex items-center justify-center mx-auto">
                                    <i data-lucide="folder-open" class="w-10 h-10 text-gray-600"></i>
                                </div>
                                <h4 class="text-xl font-bold text-gray-500">No content available yet</h4>
                                <p class="text-gray-600 max-w-xs mx-auto">Check back later or publish new content if you are a teacher or admin.</p>
                            </div>
                        `}
                    </div>
                </div>
            `;

            lucide.createIcons();

            const uploadForm = document.getElementById('upload-form');
            if (uploadForm) {
                uploadForm.onsubmit = async (e) => {
                    e.preventDefault();
                    const title = document.getElementById('post-title').value;
                    const desc = document.getElementById('post-desc').value;
                    const audience = document.getElementById('post-audience').value;
                    const fileInput = document.getElementById('post-file');
                    const file = fileInput.files[0];
                    const btn = document.getElementById('upload-btn');

                    if (!file) return;
                    btn.disabled = true;
                    btn.innerText = 'UPLOADING...';

                    try {
                        const fileName = `${Date.now()}_${file.name}`;
                        const { error: uploadError } = await supabaseClient.storage.from('files').upload(fileName, file);
                        if (uploadError) throw uploadError;

                        const { data: { publicUrl } } = supabaseClient.storage.from('files').getPublicUrl(fileName);

                        let type = 'file';
                        if (file.type.startsWith('image/')) type = 'image';
                        else if (file.type.startsWith('video/')) type = 'video';
                        else if (file.type === 'application/pdf') type = 'pdf';

                        const { error: dbError } = await supabaseClient.from('posts').insert([{
                            title,
                            description: desc,
                            audience,
                            file_url: publicUrl,
                            type,
                            user_id: state.profile.id
                        }]);

                        if (dbError) throw dbError;
                        alert("Post published!");
                        await fetchPosts();
                    } catch (err) {
                        alert(err.message);
                    } finally {
                        btn.disabled = false;
                        btn.innerText = 'PUBLISH CONTENT';
                    }
                };
            }
        }

        window.deletePost = async (id) => {
            if (!confirm("Delete this post?")) return;
            await supabaseClient.from('posts').delete().eq('id', id);
            await fetchPosts();
        };

        // Start App
        init();
    </script>
</body>
</html>
